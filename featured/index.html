<script>

(function(){
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.querySelectorAll(".page-hero [data-split]").forEach(el=>el.classList.add("sp-run"));
  }));

(function(){
  var root=document.getElementById("render-root"); if(!root||!("MutationObserver" in window)) return;
  var apply=function(){
    root.querySelectorAll(".thumb-click").forEach(function(el){ el.setAttribute("data-cursor","OPEN"); });
  };
  new MutationObserver(apply).observe(root,{childList:true,subtree:true});
  apply();
})();

(function heroQuoteTypewriter(){
  var el = document.getElementById("quote-anim");
  if(!el) return;

  var OPEN = "“";
  var PART_A = "Do what you can’t. Eventually - ";
  var PART_B = "You can";
  var PERIOD = ".";
  var CLOSE = "”";
  var INSERT = " do Anything. But you can’t do Everything.";

  var FULL1 = OPEN + PART_A + PART_B + PERIOD + CLOSE;
  var WHITE_BASE = OPEN + PART_B;
  var FULL2 = WHITE_BASE + INSERT + CLOSE;

  var reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (reduceMotion) {
    el.textContent = "";
    var staticSpan = document.createElement("span");
    staticSpan.textContent = FULL1;
    el.appendChild(staticSpan);
    return;
  }

  var TYPE_MS = 105, DELETE_MS = 96, HOLD_MS = 3000, GAP_MS = 350, START_MS = 900;

  function paint(parts){
    while (el.firstChild) el.removeChild(el.firstChild);
    parts.forEach(function(p){
      if (p === "CURSOR"){
        var c = document.createElement("span");
        c.className = "q-cursor";
        el.appendChild(c);
      } else if (p.text) {
        var s = document.createElement("span");
        s.className = p.grey ? "q-text q-grey" : "q-text";
        s.textContent = p.text;
        el.appendChild(s);
      }
    });
  }

  var ci = 0;

  function typeFull1(){
    ci++;
    paint([{ text: FULL1.slice(0, ci) }, "CURSOR"]);
    if (ci < FULL1.length) setTimeout(typeFull1, TYPE_MS);
    else setTimeout(eraseFront, HOLD_MS);
  }

  var remainingA = 0;
  function eraseFront(){
    remainingA++;
    var left = OPEN + PART_A.slice(0, PART_A.length - remainingA);
    var right = PART_B + PERIOD + CLOSE;
    paint([{ text: left }, "CURSOR", { text: right }]);
    if (remainingA < PART_A.length) setTimeout(eraseFront, DELETE_MS);
    else setTimeout(moveCursorToPeriod, DELETE_MS);
  }

  function moveCursorToPeriod(){
    paint([{ text: WHITE_BASE }, "CURSOR", { text: PERIOD + CLOSE }]);
    setTimeout(removePeriod, DELETE_MS);
  }

  function removePeriod(){
    paint([{ text: WHITE_BASE }, "CURSOR", { text: CLOSE }]);
    setTimeout(startInsert, DELETE_MS);
  }

  function startInsert(){
    ci = 0;
    typeInsert();
  }

  function typeInsert(){
    ci++;
    if (ci < INSERT.length) {
      paint([
        { text: WHITE_BASE },
        { text: INSERT.slice(0, ci), grey: true },
        "CURSOR",
        { text: CLOSE, grey: true }
      ]);
      setTimeout(typeInsert, TYPE_MS);
    } else {
      paint([
        { text: WHITE_BASE },
        { text: INSERT, grey: true },
        { text: CLOSE, grey: true },
        "CURSOR"
      ]);
      setTimeout(beginEraseAll, HOLD_MS);
    }
  }

  var eraseCi = 0;
  var whiteLen = WHITE_BASE.length;
  function beginEraseAll(){
    eraseCi = FULL2.length;
    eraseAll();
  }

  function eraseAll(){
    eraseCi--;
    if (eraseCi > whiteLen) {
      paint([
        { text: FULL2.slice(0, whiteLen) },
        { text: FULL2.slice(whiteLen, eraseCi), grey: true },
        "CURSOR"
      ]);
    } else {
      paint([{ text: FULL2.slice(0, eraseCi) }, "CURSOR"]);
    }
    if (eraseCi > 0) setTimeout(eraseAll, DELETE_MS);
    else {
      remainingA = 0;
      ci = 0;
      paint(["CURSOR"]);
      setTimeout(typeFull1, GAP_MS);
    }
  }

  setTimeout(typeFull1, START_MS);
})();
document.getElementById("yr").textContent=new Date().getFullYear();

<script>

(function fixScrambleCompletion() {
  function init() {
    const links = document.querySelectorAll('.nav-links a[data-scramble]');

    links.forEach(link => {

      const idxSpan = link.querySelector('.idx');
      const idxText = idxSpan ? idxSpan.textContent : '';
      let text = link.textContent.trim();
      if (idxText) {
        text = text.replace(idxText, '').trim();
      }

      const newLink = document.createElement('a');
      newLink.href = link.href;
      newLink.className = link.className;

      Array.from(link.attributes).forEach(attr => {
        if (attr.name !== 'data-scramble') {
          newLink.setAttribute(attr.name, attr.value);
        }
      });

      newLink.innerHTML = `<span class="idx">${idxText}</span>${text}`;

      link.parentNode.replaceChild(newLink, link);

      let scrambleTimer = null;
      let isScrambling = false;
      let shouldComplete = false;

      newLink.addEventListener('mouseenter', function(e) {

        if (isScrambling) {
          shouldComplete = true;
          return;
        }

        if (scrambleTimer) {
          clearInterval(scrambleTimer);
          scrambleTimer = null;
        }

        isScrambling = true;
        shouldComplete = false;

        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        const duration = 500;
        const steps = 20;
        let step = 0;

        scrambleTimer = setInterval(() => {
          step++;
          const progress = step / steps;

          let result = '';
          const revealCount = Math.floor(text.length * Math.min(progress, 1));

          for (let i = 0; i < text.length; i++) {
            if (i < revealCount) {
              result += text[i];
            } else {
              result += chars[Math.floor(Math.random() * chars.length)];
            }
          }

          if (idxText) {
            this.innerHTML = `<span class="idx">${idxText}</span>${result}`;
          } else {
            this.textContent = result;
          }

          if (progress >= 1 || shouldComplete) {
            clearInterval(scrambleTimer);
            scrambleTimer = null;
            isScrambling = false;
            shouldComplete = false;

            if (idxText) {
              this.innerHTML = `<span class="idx">${idxText}</span>${text}`;
            } else {
              this.textContent = text;
            }
          }
        }, duration / steps);
      });

      newLink.addEventListener('mouseleave', function(e) {
        if (isScrambling) {
          shouldComplete = true;
        }
      });
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
