(function heroQuoteTypewriter(){
  var el=document.getElementById("quote-anim"); if(!el) return;
  var textEl=el.querySelector(".q-text");
  var FULL="“Ideas are cheap, execution is everything.”";
  var reduceMotion=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if(reduceMotion){ textEl.textContent=FULL; return; }
  var TYPE_MS=90, START_MS=900;
  var ci=0;
  function typeFull(){ ci++; textEl.textContent=FULL.slice(0,ci);
    if(ci<FULL.length) setTimeout(typeFull,TYPE_MS); }
  setTimeout(typeFull,START_MS);
})();
document.getElementById("yr").textContent=new Date().getFullYear();
</script>

<script>

(function fixScrambleCompletion() {
  function init() {
    const links = document.querySelectorAll('.nav-links a[data-scramble]');

    links.forEach(link => {

      const idxSpan = link.querySelector('.idx');
      const idxText = idxSpan ? idxSpan.textContent : '';
      let text = link.textContent.trim();
      if (idxText) {
        text = text.replace(idxText, '').trim();
      }

      const newLink = document.createElement('a');
      newLink.href = link.href;
      newLink.className = link.className;

      Array.from(link.attributes).forEach(attr => {
        if (attr.name !== 'data-scramble') {
          newLink.setAttribute(attr.name, attr.value);
        }
      });

      newLink.innerHTML = `<span class="idx">${idxText}</span>${text}`;

      link.parentNode.replaceChild(newLink, link);

      let scrambleTimer = null;
      let isScrambling = false;
      let shouldComplete = false;

      newLink.addEventListener('mouseenter', function(e) {

        if (isScrambling) {
          shouldComplete = true;
          return;
        }

        if (scrambleTimer) {
          clearInterval(scrambleTimer);
          scrambleTimer = null;
        }

        isScrambling = true;
        shouldComplete = false;

        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        const duration = 500;
        const steps = 20;
        let step = 0;

        scrambleTimer = setInterval(() => {
          step++;
          const progress = step / steps;

          let result = '';
          const revealCount = Math.floor(text.length * Math.min(progress, 1));

          for (let i = 0; i < text.length; i++) {
            if (i < revealCount) {
              result += text[i];
            } else {
              result += chars[Math.floor(Math.random() * chars.length)];
            }
          }

          if (idxText) {
            this.innerHTML = `<span class="idx">${idxText}</span>${result}`;
          } else {
            this.textContent = result;
          }

          if (progress >= 1 || shouldComplete) {
            clearInterval(scrambleTimer);
            scrambleTimer = null;
            isScrambling = false;
            shouldComplete = false;

            if (idxText) {
              this.innerHTML = `<span class="idx">${idxText}</span>${text}`;
            } else {
              this.textContent = text;
            }
          }
        }, duration / steps);
      });

      newLink.addEventListener('mouseleave', function(e) {
        if (isScrambling) {
          shouldComplete = true;
        }
      });
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
