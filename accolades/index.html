<script>

let CERTIFICATES = [];

function parseCSV(text){
  if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
  const rows=[]; let row=[], field="", inQ=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQ){
      if(ch==='"'){ if(text[i+1]==='"'){field+='"';i++;} else inQ=false; }
      else field+=ch;
    } else {
      if(ch==='"') inQ=true;
      else if(ch===","){ row.push(field); field=""; }
      else if(ch==="\n"){ row.push(field); rows.push(row); row=[]; field=""; }
      else if(ch==="\r"){  }
      else field+=ch;
    }
  }
  if(field.length||row.length){ row.push(field); rows.push(row); }
  return rows.filter(r=>r.length>1 || (r.length===1 && r[0]!==""));
}

async function loadCertificates(){
  const data=await PortfolioData.load("certificates");
  const head=Object.keys(data[0]||{});
  const rows=data.map(o=>head.map(h=>o[h]));
  const idx=name=>head.indexOf(name);
  const iId=idx("ID"), iTitle=idx("Title"), iIssuer=idx("Issuer"),
      iVerify=idx("Verification Link"), iThumb=idx("Thumbnail"), iCert=idx("Certificate"),
      iSubject=idx("Subject"), iSeries=idx("Series"), iOrder=idx("Series_Order"),
      iScaleThumb=idx("Scale");

  const totals={};
  rows.forEach(r=>{ const s=(r[iSeries]||"").trim(); if(s) totals[s]=(totals[s]||0)+1; });

  const ASSET = p => (!p || /^(https?:)?\/\//.test(p) || p.charAt(0)==="/") ? p : "/accolades/" + p.replace(/^\.\//,"");
  CERTIFICATES = rows.map(r=>{
  const series=(r[iSeries]||"").trim();
  const order=parseInt(r[iOrder],10);
  const subj=(r[iSubject]||"").trim();
  const scaleThumb=(r[iScaleThumb]||"YES").trim();
  return {
    id: (r[iId]||"").trim(),
    title: (r[iTitle]||"").trim(),
    issuer: (r[iIssuer]||"").trim(),
    subject: subj,
    subjects: subj.split(",").map(s=>s.trim()).filter(Boolean),
    verifyUrl: (r[iVerify]||"").trim() || "#",

    thumb: ASSET((r[iThumb]||"").trim() || `thumbs/${(r[iId]||"").trim()}.webp`),
    fileUrl: ASSET((r[iCert]||"").trim() || `pdfs/${(r[iId]||"").trim()}.pdf`),
    type: series ? "Multi-Certificate Course" : "Standalone",
    series: series,
    seriesOrder: isNaN(order)?0:order,
    seriesTotal: series ? totals[series] : 0,
    scaleThumb: scaleThumb
  };
});
  CERTIFICATES.sort((a,b)=> a.id.localeCompare(b.id, undefined, {numeric:true}));
}

const ICON_EYE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>`;
const ICON_VERIFY = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 12 2 2 4-4"/><path d="M12 3 4 7v5c0 4.5 3.4 7.7 8 9 4.6-1.3 8-4.5 8-9V7l-8-4Z"/></svg>`;
const ICON_CHECK = `<svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5L20 7"/></svg>`;

const PINNED_ID = "000";
const DEFAULT_SUBJECT_ORDER = [
  "Aerospace Engineering",
  "Project Management",
  "Programming & IT",
  "Business & Entrepreneurship",
  "Digital Marketing"
];
let subjectOrder = [];
let subjectOn = new Set();
let activeIssuer = "all";

function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}
function attr(s){return String(s).replace(/"/g,"&quot;");}
function slugify(s){return String(s).toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");}
function uniqueSorted(a){return [...new Set(a)].sort((x,y)=>x.localeCompare(y));}

function buildSubjectOrder(){
  const present = uniqueSorted(CERTIFICATES.flatMap(c=>c.subjects));
  const ordered = DEFAULT_SUBJECT_ORDER.filter(s=>present.includes(s));
  const rest = present.filter(s=>!ordered.includes(s)).sort((a,b)=>a.localeCompare(b));
  subjectOrder = [...ordered, ...rest];
}

function passesIssuer(c){ return activeIssuer==="all" || c.issuer===activeIssuer; }
function subjectCount(s){ return CERTIFICATES.filter(c=>c.subjects.includes(s) && passesIssuer(c)).length; }

function passesSubject(c){
  if(subjectOn.size===0) return true;
  return c.subjects.some(s=>subjectOn.has(s));
}
function passesFilter(c){ return passesSubject(c) && passesIssuer(c); }

function issuerOptions(){
  const pool=CERTIFICATES.filter(c=>passesSubject(c));
  const vals=uniqueSorted(pool.map(c=>c.issuer));
  return [{value:"all",label:"All",count:pool.length},
    ...vals.map(v=>({value:v,label:v,count:pool.filter(c=>c.issuer===v).length}))];
}

function buildDropdowns(){
  document.querySelectorAll(".dd").forEach(dd=>{
    const btn=dd.querySelector(".dd-btn");
    btn.addEventListener("click",e=>{
      e.stopPropagation();
      const wasOpen=dd.classList.contains("open");
      closeAllDD();
      if(!wasOpen){ rebuildMenu(dd); dd.classList.add("open"); }
    });
  });
  document.addEventListener("click",closeAllDD);
  syncDropdownLabels();
}

function rebuildMenu(dd){
  const group=dd.dataset.group;
  const menu=dd.querySelector(".dd-menu");
  if(group==="subject"){ buildSubjectMenu(menu); }
  else { buildIssuerMenu(menu); }
}

const ICON_GRIP = `<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.6"/><circle cx="15" cy="6" r="1.6"/><circle cx="9" cy="12" r="1.6"/><circle cx="15" cy="12" r="1.6"/><circle cx="9" cy="18" r="1.6"/><circle cx="15" cy="18" r="1.6"/></svg>`;
const ICON_TICK = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5L20 7"/></svg>`;

function buildSubjectMenu(menu){
  menu.classList.add("multi");
  let html='<div class="so-hint">Tick Subjects to filter. Drag handle to Sort order.</div>';
  html += subjectOrder.map(s=>{
    const on = subjectOn.has(s);
    return `<div class="so-row ${on?'on':''}" draggable="true" data-subj="${attr(s)}">
      <span class="so-grip" title="Drag to reorder">${ICON_GRIP}</span>
      <span class="so-check">${ICON_TICK}</span>
      <span class="so-label">${esc(s)}</span>
      <span class="so-count">${subjectCount(s)}</span>
    </div>`;
  }).join("");
  html += `<div class="so-actions">
      <button data-act="all">Select all</button>
      <button data-act="clear">Clear</button>
    </div>`;
  menu.innerHTML=html;

  menu.querySelectorAll(".so-row").forEach(row=>{
    row.addEventListener("click",ev=>{
      if(ev.target.closest(".so-grip")) return;
      ev.stopPropagation();
      const s=row.dataset.subj;
      if(subjectOn.has(s)) subjectOn.delete(s); else subjectOn.add(s);
      row.classList.toggle("on", subjectOn.has(s));
      const cnt=row.querySelector(".so-count"); if(cnt) cnt.textContent=subjectCount(s);
      syncDropdownLabels(); render();
    });
  });
  menu.querySelectorAll(".so-actions button").forEach(b=>{
    b.addEventListener("click",ev=>{
      ev.stopPropagation();
      const a=b.dataset.act;
      if(a==="all") subjectOn=new Set(subjectOrder);
      else if(a==="clear") subjectOn=new Set();
      else if(a==="reset") buildSubjectOrder();
      buildSubjectMenu(menu); syncDropdownLabels(); render();
    });
  });
  wireSubjectDnD(menu);
}

function wireSubjectDnD(menu){
  let dragEl=null;
  menu.querySelectorAll(".so-row").forEach(row=>{
    row.addEventListener("dragstart",e=>{ dragEl=row; row.classList.add("dragging");
      e.dataTransfer.effectAllowed="move"; try{e.dataTransfer.setData("text/plain","");}catch(_){} });
    row.addEventListener("dragend",()=>{ row.classList.remove("dragging");
      menu.querySelectorAll(".so-row").forEach(r=>r.classList.remove("drop-target")); dragEl=null; });
    row.addEventListener("dragover",e=>{ e.preventDefault();
      menu.querySelectorAll(".so-row").forEach(r=>r.classList.remove("drop-target"));
      if(row!==dragEl) row.classList.add("drop-target"); });
    row.addEventListener("drop",e=>{
      e.preventDefault(); e.stopPropagation();
      if(!dragEl||dragEl===row) return;
      const from=dragEl.dataset.subj, to=row.dataset.subj;
      const fi=subjectOrder.indexOf(from), ti=subjectOrder.indexOf(to);
      subjectOrder = subjectOrder.filter(x=>x!==from);
      const idx=subjectOrder.indexOf(to);
      subjectOrder.splice(idx + (fi<ti?1:0), 0, from);
      buildSubjectMenu(menu); render();
    });
  });
}

function buildIssuerMenu(menu){
  menu.classList.remove("multi");
  menu.innerHTML = issuerOptions().map(o=>
    `<div class="dd-opt ${activeIssuer===o.value?'selected':''}" data-value="${attr(o.value)}">
       <span>${esc(o.label)}</span>
       <span style="display:flex;align-items:center;gap:8px"><span class="count">${o.count}</span>${ICON_CHECK}</span>
     </div>`).join("");
  menu.querySelectorAll(".dd-opt").forEach(opt=>{
    opt.addEventListener("click",ev=>{
      ev.stopPropagation();
      activeIssuer=opt.dataset.value;
      closeAllDD(); syncDropdownLabels(); render();
    });
  });
}

function closeAllDD(){ document.querySelectorAll(".dd").forEach(d=>d.classList.remove("open")); }

function syncDropdownLabels(){
  const subjDD=document.querySelector('.dd[data-group="subject"]');
  if(subjDD){
    let lbl="All";
    if(subjectOn.size>0){
      const sel=subjectOrder.filter(s=>subjectOn.has(s));
      lbl = sel.length===1 ? sel[0] : sel.length+" selected";
    }
    subjDD.querySelector(".dd-val").textContent=lbl;
    subjDD.querySelector(".dd-btn").classList.toggle("has-value", subjectOn.size>0);
  }
  const issDD=document.querySelector('.dd[data-group="issuer"]');
  if(issDD){
    issDD.querySelector(".dd-val").textContent = activeIssuer==="all" ? "All" : activeIssuer;
    issDD.querySelector(".dd-btn").classList.toggle("has-value", activeIssuer!=="all");
  }
  const anyActive = subjectOn.size>0 || activeIssuer!=="all";
  document.getElementById("clear-filters").style.display = anyActive ? "inline-flex" : "none";
}

document.getElementById("clear-filters").addEventListener("click",()=>{
  subjectOn=new Set(); activeIssuer="all"; buildSubjectOrder();
  syncDropdownLabels(); render();
});

function cardHTML(c,idx){
  const verifyAttrs = (c.verifyUrl && c.verifyUrl!=="#")
    ? `href="${attr(c.verifyUrl)}" target="_blank" rel="noopener"`
    : `href="#" aria-disabled="true" title="Verification link to be added"`;
  const THUMB_VERSION = 2;
  const thumbSrc = (c.thumb ? attr(c.thumb) : `/accolades/thumbs/${slugify(c.title)}.webp`) + "?v=" + THUMB_VERSION;
  const objectFit = c.scaleThumb === "NO" ? "contain" : "cover";
  return `
  <article class="card" data-idx="${idx}">
    <div class="thumb">
      <img class="cert-img" src="${thumbSrc}" alt="${attr(c.title)} certificate" loading="lazy" style="object-fit: ${objectFit}; object-position: ${objectFit === 'cover' ? 'top center' : 'center'}">
      <div class="thumb-click" data-view="${idx}" data-cursor="VIEW" role="button" aria-label="Preview ${attr(c.title)}"></div>
    </div>
    <div class="card-body">
      <h3 class="card-title" title="${attr(c.title)}">${esc(c.title)}</h3>
      <div class="card-issuer">${esc(c.issuer)}</div>
    </div>
    <div class="action-bar">
      <a class="btn btn-verify" ${verifyAttrs}>${ICON_VERIFY} Verify</a>
      <button class="btn btn-view" data-view="${idx}" aria-label="Preview certificate">${ICON_EYE} View</button>
    </div>
  </article>`;
}

function orderWithinGroup(items){
  const firstIndexOfSeries=new Map();
  items.forEach(item=>{
    if(item.c.type==="Multi-Certificate Course" && !firstIndexOfSeries.has(item.c.series))
      firstIndexOfSeries.set(item.c.series, item.i);
  });
  return [...items].sort((a,b)=>{
    const ka=a.c.type==="Multi-Certificate Course"?firstIndexOfSeries.get(a.c.series):a.i;
    const kb=b.c.type==="Multi-Certificate Course"?firstIndexOfSeries.get(b.c.series):b.i;
    if(ka!==kb) return ka-kb;
    return (a.c.seriesOrder||0)-(b.c.seriesOrder||0);
  });
}

function render(){
  const root=document.getElementById("render-root");
  const matches=CERTIFICATES.map((c,i)=>({c,i})).filter(({c})=>passesFilter(c));
  document.getElementById("results-meta").textContent=`Displaying ${matches.length} of ${CERTIFICATES.length} Certificates`;

  if(matches.length===0){
    root.innerHTML=`<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><p>No certificates match these filters.</p></div>`;
    return;
  }

  const seen=new Set();
  const out=[];
  const pinned=matches.find(m=>m.c.id===PINNED_ID);
  if(pinned){ out.push(pinned); seen.add(pinned.i); }

  // With subjects actively ticked, group the results by the chosen subject
  // sort order. With no subject filter active, fall through and keep the
  // natural Column A (ID) order that CERTIFICATES is already sorted in.
  if(subjectOn.size>0){
    const activeSubjects = subjectOrder.filter(s=>subjectOn.has(s));
    activeSubjects.forEach(subj=>{
      const inGroup=matches.filter(m=>!seen.has(m.i) && m.c.subjects.includes(subj));
      orderWithinGroup(inGroup).forEach(m=>{ out.push(m); seen.add(m.i); });
    });
  }

  // matches is built from the ID-sorted CERTIFICATES array, so this preserves
  // Column A order for the default view (and for any items not in a ticked group).
  matches.forEach(m=>{ if(!seen.has(m.i)){ out.push(m); seen.add(m.i); } });

  const html=`<div class="grid">${out.map(({c,i})=>cardHTML(c,i)).join("")}</div>`;
  root.style.opacity="0";
  root.innerHTML=html;
  requestAnimationFrame(()=>{root.style.opacity="1";});

  root.querySelectorAll("[data-view]").forEach(el=>el.addEventListener("click",()=>openModal(parseInt(el.dataset.view,10))));
  root.querySelectorAll('a[aria-disabled="true"]').forEach(a=>a.addEventListener("click",e=>e.preventDefault()));
}

const modal=document.getElementById("modal");
const closeBtn=document.getElementById("m-close");
function openModal(idx){
  const c=CERTIFICATES[idx];
  const src=`${attr(c.fileUrl)}#toolbar=0&navpanes=0&scrollbar=0&view=Fit`;
  const wrap=document.getElementById("m-docwrap");
  wrap.innerHTML=`<iframe class="modal-doc" src="${src}" title="${attr(c.title)}"></iframe>`;
  const iframe=wrap.querySelector(".modal-doc");
  if(c.thumb){
    const probe=new Image();
    probe.onload=()=>{ if(probe.naturalWidth&&probe.naturalHeight)
      iframe.style.aspectRatio = probe.naturalWidth+" / "+probe.naturalHeight; };
    probe.src=c.thumb;
  }
  modal.classList.add("open");
  closeBtn.style.display="flex";
  document.body.style.overflow="hidden";
}
function closeModal(){
  modal.classList.remove("open");
  closeBtn.style.display="none";
  document.body.style.overflow="";
  document.getElementById("m-docwrap").innerHTML="";
}
closeBtn.addEventListener("click",closeModal);
modal.addEventListener("click",e=>{if(e.target===modal||e.target.id==="m-docwrap")closeModal();});
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&modal.classList.contains("open"))closeModal();});

})();

(function heroQuoteTypewriter(){
  var el = document.getElementById("quote-anim");
  if(!el) return;
  var textEl = el.querySelector(".q-text");

  var OPEN = "“";
  var PREFIX = "The more you know, ";
  var TAIL1 = "the more you see.";
  var TAIL2 = "the more you know you don’t know.";
  var CLOSE = "”";

  var WHITE_BASE = OPEN + PREFIX;
  var FULL1 = WHITE_BASE + TAIL1 + CLOSE;
  var TAIL2_CLOSE = TAIL2 + CLOSE;

  var reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (reduceMotion) { textEl.textContent = FULL1; return; }

  var whiteSpan = document.createElement("span");
  var greySpan = document.createElement("span");
  greySpan.className = "q-grey";
  textEl.textContent = "";
  textEl.appendChild(whiteSpan);
  textEl.appendChild(greySpan);

  var TYPE_MS = 105, DELETE_MS = 96, HOLD_MS = 3000, GAP_MS = 350, START_MS = 900;
  var ci = 0;

  function typeFull1(){
    ci++;
    whiteSpan.textContent = FULL1.slice(0, ci);
    greySpan.textContent = "";
    if (ci < FULL1.length) setTimeout(typeFull1, TYPE_MS);
    else setTimeout(eraseTail1, HOLD_MS);
  }
  function eraseTail1(){
    ci--;
    whiteSpan.textContent = FULL1.slice(0, ci);
    if (ci > WHITE_BASE.length) setTimeout(eraseTail1, DELETE_MS);
    else { ci = 0; setTimeout(typeTail2, TYPE_MS); }
  }
  function typeTail2(){
    ci++;
    greySpan.textContent = TAIL2_CLOSE.slice(0, ci);
    if (ci < TAIL2_CLOSE.length) setTimeout(typeTail2, TYPE_MS);
    else setTimeout(eraseTail2, HOLD_MS);
  }
  function eraseTail2(){
    ci--;
    greySpan.textContent = TAIL2_CLOSE.slice(0, ci);
    if (ci > 0) setTimeout(eraseTail2, DELETE_MS);
    else { ci = WHITE_BASE.length; setTimeout(eraseBase, DELETE_MS); }
  }
  function eraseBase(){
    ci--;
    whiteSpan.textContent = FULL1.slice(0, ci);
    if (ci > 0) setTimeout(eraseBase, DELETE_MS);
    else { ci = 0; setTimeout(typeFull1, GAP_MS); }
  }
  setTimeout(typeFull1, START_MS);
})();
document.getElementById("yr").textContent=new Date().getFullYear();

(function fixScrambleCompletion() {
  function init() {
    const links = document.querySelectorAll('.nav-links a[data-scramble]');

    links.forEach(link => {

      const idxSpan = link.querySelector('.idx');
      const idxText = idxSpan ? idxSpan.textContent : '';
      let text = link.textContent.trim();
      if (idxText) {
        text = text.replace(idxText, '').trim();
      }

      const newLink = document.createElement('a');
      newLink.href = link.href;
      newLink.className = link.className;

      Array.from(link.attributes).forEach(attr => {
        if (attr.name !== 'data-scramble') {
          newLink.setAttribute(attr.name, attr.value);
        }
      });

      newLink.innerHTML = `<span class="idx">${idxText}</span>${text}`;

      link.parentNode.replaceChild(newLink, link);

      let scrambleTimer = null;
      let isScrambling = false;
      let shouldComplete = false;

      newLink.addEventListener('mouseenter', function(e) {

        if (isScrambling) {
          shouldComplete = true;
          return;
        }

        if (scrambleTimer) {
          clearInterval(scrambleTimer);
          scrambleTimer = null;
        }

        isScrambling = true;
        shouldComplete = false;

        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        const duration = 500;
        const steps = 20;
        let step = 0;

        scrambleTimer = setInterval(() => {
          step++;
          const progress = step / steps;

          let result = '';
          const revealCount = Math.floor(text.length * Math.min(progress, 1));

          for (let i = 0; i < text.length; i++) {
            if (i < revealCount) {
              result += text[i];
            } else {
              result += chars[Math.floor(Math.random() * chars.length)];
            }
          }

          if (idxText) {
            this.innerHTML = `<span class="idx">${idxText}</span>${result}`;
          } else {
            this.textContent = result;
          }

          if (progress >= 1 || shouldComplete) {
            clearInterval(scrambleTimer);
            scrambleTimer = null;
            isScrambling = false;
            shouldComplete = false;

            if (idxText) {
              this.innerHTML = `<span class="idx">${idxText}</span>${text}`;
            } else {
              this.textContent = text;
            }
          }
        }, duration / steps);
      });

      newLink.addEventListener('mouseleave', function(e) {
        if (isScrambling) {
          shouldComplete = true;
        }
      });
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
